<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />

<div class="dashboard-container">
  {% if not user.tasks %}
    <div class="no-task-container">
      <span class="no-task-label">
        You do not have any tasks at this time...
      </span>

      <span class="no-task-label">
        Get started with tracking your tasks by clicking the button below
      </span>

      <button type="button" class="new-task-button">
        New Task
      </button>
    </div>
  {% endif %}

  <div id="taskPopup" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Create New Task</h2>
      <form id="taskForm" method="POST" action="{{ url_for('create_task') }}">
        <div class="form-group">
          <label for="taskTitle">Task Title *</label>
          <input type="text" id="taskTitle" name="title" placeholder="Enter task title" required>
        </div>
        
        <div class="form-group">
          <label for="taskContent">Description *</label>
          <textarea id="taskContent" name="content" placeholder="Enter task description" rows="4" required></textarea>
        </div>
        
        <div class="form-group">
          <label for="taskPriority">Priority *</label>
          <select id="taskPriority" name="priority" required>
            <option value="">Select priority</option>
            <option value="3">Low (3)</option>
            <option value="2" selected>Medium (2)</option>
            <option value="1">High (1)</option>
          </select>
        </div>
        
        <div class="form-group-row">
          <div class="form-group half">
            <label for="dueDate">Due Date *</label>
            <input type="date" id="dueDate" name="due_date" required>
          </div>
          
          <div class="form-group half">
            <label for="dueTime">Due Time *</label>
            <input type="time" id="dueTime" name="due_time" required>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Create Task</button>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const modal = document.getElementById('taskPopup');
      const closeBtn = document.querySelector('.close-btn');
      const newTaskBtn = document.querySelector('.new-task-button');
      
      if (newTaskBtn) {
        newTaskBtn.addEventListener('click', function() {
          modal.style.display = 'block';
          
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('dueDate').min = today;
          
          const now = new Date();
          now.setHours(now.getHours() + 1);
          const timeString = now.toTimeString().slice(0, 5);
          document.getElementById('dueTime').value = timeString;
        });
      }
      
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          modal.style.display = 'none';
        });
      }
      
      window.addEventListener('click', function(event) {
        if (event.target === modal) {
          modal.style.display = 'none';
        }
      });
    });
  </script>
</div>
