[project]
name = "task-manager"
version = "1.0.0"
description = "A Text TUI application for task management"
authors = [
    {name = "mek0124", email = "mek0124@proton.me"},
]
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

dependencies = [
  "pydantic>=2.12.5",
  "pyinstaller>=6.17.0",
  "pytest>=9.0.1",
  "pytest-asyncio>=1.3.0",
  "setuptools>=80.9.0",
  "sqlalchemy>=2.0.44",
  "textual>=6.7.1",
  "wheel>=0.45.1"
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "black>=22.0",
    "flake8>=4.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"